spring:
  application:
    name: reserva-service
  profiles:
    active: dev

# Configuración de Base de Datos
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_reserva_db?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:     
    driver-class-name: com.mysql.cj.jdbc.Driver

# Configuración del JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

# Puerto del microservicio
server:
  port: 8087

# URL para que otros lo encuentren (Servicios externos)
servicios:
  autorizacion:
    baseUrl: http://localhost:8081
    url: http://localhost:8081
  huesped:
    baseUrl: http://localhost:8082
    url: http://localhost:8082
  hotel:
    baseUrl: http://localhost:8083
    url: http://localhost:8083

# Configuración para que funcione swagger
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

---

spring:
  config:
    activate:
      on-profile: dev, prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hotel_reserva_db}?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:}

server:
  port: ${PORT:8087}

servicios:
  autorizacion:
    baseUrl: ${AUTORIZACION_SERVICE_URL:http://${DB_HOST:localhost}:8081}
    url: ${AUTORIZACION_SERVICE_URL:http://${DB_HOST:localhost}:8081}
  huesped:
    baseUrl: ${HUESPED_SERVICE_URL:http://${DB_HOST:localhost}:8082}
    url: ${HUESPED_SERVICE_URL:http://${DB_HOST:localhost}:8082}
  hotel:
    baseUrl: ${HOTEL_SERVICE_URL:http://${DB_HOST:localhost}:8083}
    url: ${HOTEL_SERVICE_URL:http://${DB_HOST:localhost}:8083}