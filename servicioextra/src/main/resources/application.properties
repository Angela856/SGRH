spring.application.name=servicio-extra

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sgrh_servicios_db
spring.datasource.username=root
spring.datasource.password=

# Flyway / JPA / Server
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
server.port=8084

# Logging
logging.level.cl.duocuc=DEBUG
logging.file.name=logs/servicio-extra.log

# Web client configuration (Llama a Reserva)
services.reserva.url=http://localhost:8081