# Nombre del Microservicio
spring.application.name=comentario-service
# Puerto asignado para Comentarios en la arquitectura
server.port=8090

# Configuración de Conexión a Base de Datos Independiente (Laragon)
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_comentario_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CORRECCIÓN CRÍTICA DUOC: Cambiamos a 'validate' para que Flyway sea el único dueño del orden de las tablas
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración Activa de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Conexiones externas (Rutas para comunicarse mediante OpenFeign)
servicios.huesped.url=http://localhost:8082
servicios.hotel.url=http://localhost:8083