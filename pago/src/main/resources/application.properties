spring.application.name=pago

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sgrh_pago_db
spring.datasource.username=root
spring.datasource.password=

# Flyway / JPA / Server
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
server.port=8083

# Logging
logging.level.cl.duocuc=DEBUG
logging.file.name=logs/pago.log

# Web client configuration (Llama a Reserva)
services.reserva.url=http://localhost:8081