# Nombre del Microservicio
spring.application.name=tarifa-service
# Puerto asignado en la arquitectura distribuida
server.port=8086

# Configuración de Conexión a Base de Datos (Laragon)
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_tarifa_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CORRECCIÓN CRÍTICA DUOC: Cedemos el control de las tablas a Flyway. 
# 'validate' solo comprueba que las tablas de Laragon coincidan con las entidades de Java, sin alterarlas arbitrariamente.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Flyway (Garantiza que corran tus scripts V1__...)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Conexiones externas (Rutas del API Gateway / OpenFeign)
servicios.habitacion.url=http://localhost:8084