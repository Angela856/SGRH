spring:
  application:
    name: gateway-service
  profiles:
    active: dev
  cloud:
    gateway:
      routes:
        - id: autorizacion-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: servicioextra-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/servicios-extras/**

        - id: hotel-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/hoteles/**

        - id: reserva-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/reservas/**

        - id: pago-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/pagos/**
        - id: huesped-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/huesped/**

        - id: habitacion-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/habitacion/**

        - id: disponibilidad-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/disponibilidad/**
        - id: tarifa-service
          uri: http://localhost:8086  
          predicates:
            - Path=/api/tarifa/**

        - id: comentario-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/comentario/**
          filters:
            - AddResponseHeader=X-Gateway-Time, Development-Environment
        

server:
  port: 8080