server:
  port: 8080

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      routes:
        
        # RUTA DIRECTA PARA EL HTML DE SWAGGER 
        
        - id: swagger-ui-redirect
          uri: http://localhost:8080
          predicates:
            - Path=/swagger-ui.html
          filters:
            - RedirectTo=302, /webjars/swagger-ui/index.html

        
        # RUTAS DE DOCUMENTACIÓN SWAGGER (v3/api-docs)
        
        - id: docs-autorizacion
          uri: http://autorizacion-service:8081
          predicates:
            - Path=/v3/api-docs/autorizacion
          filters:
            - SetPath=/v3/api-docs

        - id: docs-huesped
          uri: http://huesped-service:8082
          predicates:
            - Path=/v3/api-docs/huesped
          filters:
            - SetPath=/v3/api-docs

        - id: docs-hotel
          uri: http://hotel-service:8083
          predicates:
            - Path=/v3/api-docs/hotel
          filters:
            - SetPath=/v3/api-docs

        - id: docs-habitacion
          uri: http://habitacion-service:8084
          predicates:
            - Path=/v3/api-docs/habitacion
          filters:
            - SetPath=/v3/api-docs

        - id: docs-disponibilidad
          uri: http://disponibilidad-service:8085
          predicates:
            - Path=/v3/api-docs/disponibilidad
          filters:
            - SetPath=/v3/api-docs

        - id: docs-tarifa
          uri: http://tarifa-service:8086
          predicates:
            - Path=/v3/api-docs/tarifa
          filters:
            - SetPath=/v3/api-docs

        - id: docs-reserva
          uri: http://reserva-service:8087
          predicates:
            - Path=/v3/api-docs/reserva
          filters:
            - SetPath=/v3/api-docs

        - id: docs-servicioextra
          uri: http://servicioextra-service:8088
          predicates:
            - Path=/v3/api-docs/servicioextra
          filters:
            - SetPath=/v3/api-docs

        - id: docs-pago
          uri: http://pago-service:8089
          predicates:
            - Path=/v3/api-docs/pago
          filters:
            - SetPath=/v3/api-docs

        - id: docs-comentario
          uri: http://comentario-service:8090
          predicates:
            - Path=/v3/api-docs/comentario
          filters:
            - SetPath=/v3/api-docs

        
        # RUTAS DE MICROSERVICIOS 
        
        # 1. Autorización
        - id: ms-auth-route
          uri: http://autorizacion-service:8081
          predicates:
            - Path=/api/auth/**

        # 2. Huésped
        - id: ms-huespedes-route
          uri: http://huesped-service:8082
          predicates:
            - Path=/api/huespedes/**

        # 3. Hotel
        - id: ms-hoteles-route
          uri: http://hotel-service:8083
          predicates:
            - Path=/api/hoteles/**

        # 4. Habitación
        - id: ms-habitacion-route
          uri: http://habitacion-service:8084
          predicates:
            - Path=/api/habitacion/**

        # 5. Disponibilidad
        - id: ms-disponibilidad-route
          uri: http://disponibilidad-service:8085
          predicates:
            - Path=/api/disponibilidad/**

        # 6. Tarifa
        - id: ms-tarifa-route
          uri: http://tarifa-service:8086
          predicates:
            - Path=/api/tarifa/**

        # 7. Reserva
        - id: ms-reservas-route
          uri: http://reserva-service:8087
          predicates:
            - Path=/api/reservas/**

        # 8. Servicio Extra
        - id: ms-servicios-extras-route
          uri: http://servicioextra-service:8088
          predicates:
            - Path=/api/servicios-extras/**

        # 9. Pago
        - id: ms-pagos-route
          uri: http://pago-service:8089
          predicates:
            - Path=/api/pagos/**

        # 10. Comentario
        - id: ms-comentario-route
          uri: http://comentario-service:8090
          predicates:
            - Path=/api/comentario/**


# CONFIGURACIÓN SWAGGER 

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: 1. Autorización
        url: /v3/api-docs/autorizacion
      - name: 2. Huéspedes
        url: /v3/api-docs/huesped
      - name: 3. Hoteles
        url: /v3/api-docs/hotel
      - name: 4. Habitación
        url: /v3/api-docs/habitacion
      - name: 5. Disponibilidad
        url: /v3/api-docs/disponibilidad
      - name: 6. Tarifa
        url: /v3/api-docs/tarifa
      - name: 7. Reservas
        url: /v3/api-docs/reserva
      - name: 8. Servicios Extras
        url: /v3/api-docs/servicioextra
      - name: 9. Pagos
        url: /v3/api-docs/pago
      - name: 10. Comentarios
        url: /v3/api-docs/comentario